<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/output.css">
    <title>Document</title>
  </head>
  <body class="flex justify-center items-center min-h-screen">
   <form id="movment-form">
    <section>
      <h2>Basic Information</h2>

      <div>
        <label for="name">Movement Name</label>
        <input
          id="name"
          name="name"
          type="text"
          required
        />
      </div>

      <div>
        <label for="summary">Short Summary</label>
        <textarea
          id="summary"
          name="summary"
          rows="2"
          required
        ></textarea>
      </div>

      <div>
        <label for="description">Full Description</label>
        <textarea
          id="description"
          name="description"
          rows="5"
          required
        ></textarea>
      </div>

      <div>
        <label for="difficulty">Difficulty</label>
        <select id="difficulty" name="difficulty" required>
          <option value="">Choose a difficulty</option>
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>
      </div>

      <div>
        <label for="status">Status</label>
        <select id="status" name="status" required>
          <option value="draft">Draft</option>
          <option value="published">Published</option>
          <option value="needs-review">Needs Review</option>
        </select>
      </div>
    </section>

    <section>
      <h2>Teaching Information</h2>

      <div>
        <label for="when-to-use">When to Use It</label>
        <textarea
          id="when-to-use"
          name="when-to-use"
          rows="4"
          ></textarea>
      </div>

      <div>
        <label for="how-to-perform">How to Perform It</label>
        <textarea
          id="how-to-perform"
          name="how-to-perform"
          rows="6"
          ></textarea>
      </div>

      <div>
        <label for="common-mistakes">Common Mistakes</label>
        <textarea
          id="common-mistakes"
          name="common-mistakes"
          rows="5"
          ></textarea>
      </div>
    </section>

    <section>
      <h2>Organization</h2>

      <div>
        <label for="tags">Tags</label>
        <input
          id="tags"
          name="tags"
          type="text"
          placeholder="Example: balance, overhang, hip rotation"
          />
      </div>

      <p>Separate multiple tags with commas.</p>
    </section>

    <section>
      <h2>Internal Notes</h2>

      <div>
        <label for="research-notes">Research Notes</label>
        <textarea
          id="research-notes"
          name="research-notes"
          rows="5"
          ></textarea>
      </div>

      <div>
        <label for="extra-notes">Extra Notes</label>
        <textarea
          id="extra-notes"
          name="extra-notes"
          rows="5"
          ></textarea>
      </div>
    </section>

      <button type="submit">Create Movement</button>
  </form> 


    <!-- create form ( name, difficulty, description, extraNotes) -->
    <!-- POST REQUEST to /movements -->
  </body>
</html>
