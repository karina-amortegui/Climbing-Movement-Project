<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/output.css" />
    <title>Admin Login</title>
  </head>

  <body class="h-full">
    <main class="flex min-h-screen items-center justify-center px-6 py-12">
      <div class="w-full sm:max-w-sm rounded-lg border border-gray-300 px-10 py-12">
        
        <div class="text-center">
          <img
            src="#"
            alt="Your Company"
            class="mx-auto h-10 w-auto"
          />

          <h1 class="mt-10 text-2xl/9 font-bold tracking-tight text-gray-600">
            Sign in to your account
          </h1>
        </div>

        <form id="loginForm" class="mt-10 space-y-6">
          <div>
            <label for="username" class="block text-sm/6 font-medium text-gray-600">
              Username
            </label>

            <input
              id="username"
              type="text"
              name="username"
              required
              placeholder="Example User"
              class="mt-2 block w-full rounded-lg border-2 border-gray-600 px-3 py-2 text-base text-black placeholder:text-gray-500 focus:border-indigo-500 focus:outline-none"
              value="admin"
            />
          </div>

          <div>
            <label for="password" class="block text-sm/6 font-medium text-gray-600">
              Password
            </label>

            <input
              id="password"
              type="password"
              name="password"
              required
              placeholder="*********"
              class="mt-2 block w-full rounded-lg border-2 border-gray-600 px-3 py-2 text-base text-black placeholder:text-gray-500 focus:border-indigo-500 focus:outline-none"
              value="123456s*"
            />
          </div>

          <div>
            <a href="#" class="text-sm font-semibold text-indigo-400 hover:text-indigo-300">
              Forgot password?
            </a>
          </div>

          <button
            type="submit"
            class="flex w-full justify-center rounded-lg bg-indigo-500 px-4 py-3 text-sm font-semibold text-white hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500"
          >
            Sign in
          </button>
        </form>
      </div>
    </main>

    <script>
      const form = document.getElementById("loginForm");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        console.log('login: data =', data)

        if (data.username === "" || data.password === "") {
          return alert("username and password are required");
        }

        fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(data),
        })
          .then((response) => {
            if (response.redirected) {
              window.location.href = response.url 
            }
            console.log('response =', response)
            return response.json();
            
          })
          .then((data) => {
            if (data.message === "invalid credentials") {
              form.reset();
              return alert("Please check your username and password");
            }

            console.log("login successful");
          });
      });
    </script>
  </body>
</html>
